<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buronka Flip</title>

<link rel="stylesheet" href="../style.css">

<style>

.flip-container{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
padding:40px;
}

.coin-area{
height:200px;
display:flex;
align-items:center;
justify-content:center;
}

.coin{

width:150px;
height:150px;
border-radius:50%;
background:linear-gradient(145deg,#ffd700,#caa000);
display:flex;
align-items:center;
justify-content:center;
font-size:50px;

transition:transform 2s;

}

.flip{
transform:rotateY(1800deg);
}

.controls{
display:flex;
gap:10px;
}

.controls input{
padding:10px;
border-radius:6px;
border:none;
width:120px;
}

.controls button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#f4c430;
font-weight:700;
cursor:pointer;
}

.result{
font-size:22px;
font-weight:700;
}

</style>

</head>


<body>


<div class="flip-container">

<h2>🐄 BURONKA FLIP</h2>

<div class="coin-area">

<div class="coin" id="coin">
🐄
</div>

</div>


<div class="controls">

<input id="bet" placeholder="Ставка BUR">

<button onclick="choose('cow')">
Бурёнка
</button>

<button onclick="choose('normal')">
Обычная
</button>

</div>


<button onclick="flipCoin()">
Крутить
</button>


<div class="result" id="result"></div>


</div>


<script src="flip.js"></script>

</body>
</html>

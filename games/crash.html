<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buronka Crash</title>

<link rel="stylesheet" href="../style.css">

<style>

/* crash layout */

.crash-container{
display:flex;
flex-direction:column;
align-items:center;
padding:30px;
gap:20px;
}

/* history */

.crash-history{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
}

.crash-history div{
background:#1f1f28;
padding:6px 10px;
border-radius:6px;
font-size:14px;
}

/* multiplier */

.multiplier{
font-size:64px;
font-weight:800;
color:#f4c430;
}

/* graph area */

.crash-area{
width:600px;
height:300px;
background:#14141a;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

/* controls */

.crash-controls{
display:flex;
gap:10px;
}

.crash-controls input{
padding:10px;
border-radius:6px;
border:none;
width:120px;
}

.crash-controls button{
padding:10px 16px;
background:#f4c430;
border:none;
border-radius:6px;
font-weight:700;
cursor:pointer;
}

.timer{
opacity:0.6;
}

</style>

</head>


<body>

<div class="crash-container">


<h2>🚀 BURONKA CRASH</h2>


<div class="crash-history" id="history"></div>


<div class="crash-area">

<div class="multiplier" id="multiplier">
1.00x
</div>

<div class="timer" id="timer">
Ставки через 5
</div>

</div>


<div class="crash-controls">

<input id="betAmount" placeholder="Ставка BUR">

<button id="betBtn">
Ставка
</button>

<button id="cashBtn">
Забрать
</button>

</div>


</div>



<script src="crash.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buronka Casino</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Фоновая анимация монет -->
<div class="background-coins"></div>

<!-- Верхняя панель -->
<header class="topbar">
    <div class="logo">
        <div class="logo-title">BURONKA</div>
        <div class="logo-sub">Crypto Casino</div>
    </div>
    <div class="right-menu">
        <button id="connectBtn">Connect</button>
        <button id="depositBtn">Пополнение</button>
    </div>
</header>

<!-- Панель промокода и баланса -->
<div class="promo-bar">
    <input id="promoInput" placeholder="Введите промокод">
    <button id="promoBtn">Активировать</button>
    <div class="balance">
        Баланс: <span id="balance">0</span> BUR
    </div>
</div>

<!-- Сетка игр -->
<main class="games-grid">

    <div class="game-card" onclick="openGame('flip')">
        <div class="game-icon">🪙</div>
        <div class="game-title">Coin Flip</div>
    </div>

    <div class="game-card" onclick="openGame('crash')">
        <div class="game-icon">🚀</div>
        <div class="game-title">Crash</div>
    </div>

    <div class="game-card" onclick="openGame('mines')">
        <div class="game-icon">💣</div>
        <div class="game-title">Mines</div>
    </div>

    <div class="game-card" onclick="openGame('slots')">
        <div class="game-icon">🎰</div>
        <div class="game-title">Slots</div>
    </div>

</main>

<!-- Попап пополнения -->
<div id="depositPopup" class="deposit-popup">
    <div class="deposit-box">
        <h2>Пополнение BUR</h2>
        <div class="deposit-item">100 BUR = 1 ⭐</div>
        <div class="deposit-item">500 BUR = 0.5 TON</div>
        <div class="deposit-item">1000 BUR = 1 TON</div>
        <button id="closeDeposit">Закрыть</button>
    </div>
</div>

<!-- Скрипты -->
<script src="app.js"></script>
<script src="ui/animations.js"></script>

</body>
</html>

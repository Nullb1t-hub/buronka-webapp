<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buronka Casino</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">
🐄 BURONKA CASINO
</div>

<div class="top-panel">

<div class="balance-box">
<span>Баланс</span>
<div id="balance">0 BUR</div>
</div>

<button class="deposit-btn" id="depositBtn">
Пополнение
</button>

<button class="connect-btn">
Connect Wallet
</button>

</div>

</header>



<main class="games-container">


<div class="game-card" data-game="flip">

<div class="game-icon">🪙</div>

<div class="game-name">
Coin Flip
</div>

<div class="game-desc">
Бурёнка или обычная
</div>

<button class="play-button">
Играть
</button>

</div>



<div class="game-card" data-game="crash">

<div class="game-icon">🚀</div>

<div class="game-name">
Crash
</div>

<div class="game-desc">
Поймай множитель
</div>

<button class="play-button">
Играть
</button>

</div>



<div class="game-card" data-game="mines">

<div class="game-icon">💣</div>

<div class="game-name">
Mines
</div>

<div class="game-desc">
Не взорви бомбу
</div>

<button class="play-button">
Играть
</button>

</div>



<div class="game-card">

<div class="game-icon">🎰</div>

<div class="game-name">
Slots
</div>

<div class="game-desc">
Скоро
</div>

<button class="play-button">
Играть
</button>

</div>


</main>



<div class="deposit-popup" id="depositPopup">

<div class="deposit-box">

<h2>Пополнение BUR</h2>

<div class="deposit-item">100 BUR = 1 ⭐</div>
<div class="deposit-item">500 BUR = 0.5 TON</div>
<div class="deposit-item">1000 BUR = 1 TON</div>
<div class="deposit-item">5000 BUR = 5 TON</div>

<button id="closeDeposit">
Закрыть
</button>

</div>

</div>



<script src="ui/animations.js"></script>
<script src="games/flip.js"></script>
<script src="games/crash.js"></script>
<script src="games/mines.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Buronka Casino</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="topbar">

<div class="logo">
🐮 BURONKA
</div>

<div class="balance">

<span id="coins">0</span> BUR

</div>

<button class="depositBtn" onclick="openDeposit()">
Deposit
</button>

</div>


<div id="depositMenu" class="hidden">

<h2>Deposit</h2>

<div class="depositList">

<div>⭐ 1 Star = 100 BUR</div>
<div>💎 1 TON = 250 BUR</div>
<div>💵 $1 = 100 BUR</div>

</div>

<button onclick="closeDeposit()">Back</button>

</div>


<div class="games">

<div class="gameCard" onclick="openGame('crash')">
🚀 Crash
</div>

<div class="gameCard" onclick="openGame('mines')">
💣 Mines
</div>

<div class="gameCard" onclick="openGame('flip')">
🐮 Cow Flip
</div>

</div>


<div id="gameScreen" class="hidden">

<div id="gameArea"></div>

<button onclick="backHome()">Back</button>

</div>


<script src="app.js"></script>
<script src="games/crash.js"></script>
<script src="games/mines.js"></script>
<script src="games/flip.js"></script>
<script src="ui/animations.js"></script>

</body>
</html>
